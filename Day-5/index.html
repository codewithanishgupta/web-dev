<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration-Form</title>
</head>

<body>
    <form action="post">
        <div>
            <label for="username">Enter your name : </label>
            <input type="text" id="username" placeholder="Enter Username" autofocus>
        </div>
        <div>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <label for="student">Student</label>
            <input type="checkbox" name="prafesion" id="student" value="student">
            <label for="teacher">Teacher</label>
            <input type="checkbox" name="prafesion" id="teacher" value="teacher">
        </div>
        <div>
            <label for="comment">Write your Comment : </label>
            <br>
            <textarea name="comment" id="comment" rows="4" cols="30"></textarea>
        </div>
        <div>
            <select name="subject" id="subject" >
                <option value="">Select Subject</option>
                <option value="java">Java programming</option>
                <option value="graphics">Computer Graphics And Multimediea</option>
                <option value="os">Operating System</option>
                <option value="software">Software Engineer</option>
            </select>
        </div>
    </form>
</body>

</html>
